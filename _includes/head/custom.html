<!-- Apply saved theme before paint to avoid a flash of the wrong theme. Default: dark.
     Read from a cookie (shared across www/apex) first, then localStorage. -->
<script>
  (function () {
    var theme = null;
    try {
      var m = document.cookie.match(/(?:^|;\s*)theme=(dark|light)/);
      if (m) {
        theme = m[1];
      } else {
        var ls = localStorage.getItem('theme');
        if (ls === 'dark' || ls === 'light') { theme = ls; }
      }
    } catch (e) {}
    document.documentElement.setAttribute('data-theme', theme || 'dark');
  })();
</script>
<link rel="stylesheet" href="{{ base_path }}/assets/css/dark-theme.css">
